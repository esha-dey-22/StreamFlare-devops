<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | StreamFlare</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Tailwind CSS -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.0/dist/tailwind.min.css" rel="stylesheet">
</head>

<body class="flex items-center justify-center min-h-screen bg-gradient-to-br from-gray-900 via-gray-800 to-black text-white">


  <!-- Overlay -->
  <div class="absolute inset-0 bg-black bg-opacity-40"></div>

  <!-- Login Card -->
  <div class="relative z-10">
    <div class="p-1 rounded-2xl bg-gradient-to-r from-purple-600 via-indigo-600 to-pink-500 transform transition-all duration-500 hover:scale-105">
      <div class="bg-black bg-opacity-50 backdrop-blur-lg rounded-2xl p-8 w-96 shadow-2xl">

    <h2 class="text-3xl font-bold text-center mb-6 bg-clip-text text-transparent bg-gradient-to-r from-pink-400 to-indigo-400">
      Welcome Back to StreamFlare
    </h2>

    <!-- Name -->
    <input
      id="name"
      type="text"
      placeholder="Full Name"
      class="w-full p-3 mb-4 rounded-lg bg-white bg-opacity-5 border border-gray-700 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500"
    >

    <!-- Email -->
    <input
      id="email"
      type="email"
      placeholder="Email"
      class="w-full p-3 mb-4 rounded-lg bg-white bg-opacity-5 border border-gray-700 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500"
    >

    <!-- Password -->
    <input
      id="password"
      type="password"
      placeholder="Password"
      class="w-full p-3 mb-6 rounded-lg bg-white bg-opacity-5 border border-gray-700 text-white placeholder-gray-400 outline-none focus:ring-2 focus:ring-pink-500 focus:border-pink-500"
    >

    <!-- Login Button -->
    <button
      onclick="login()"
      class="w-full bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-600 hover:to-purple-700 text-white py-3 rounded-lg font-bold transition-all duration-300 transform hover:scale-105 shadow-lg"
    >
      Login
    </button>

    <p class="text-gray-400 text-sm text-center mt-4">
      World of Entertainment at Your Fingertips
    </p>
      </div>
    </div>
  </div>

  <!-- Login Script -->
  <script>
    function login() {
      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      if (!name || !email || !password) {
        alert("Please enter name, email, and password");
        return;
      }

      // Save login state
      localStorage.setItem("isLoggedIn", "true");
      localStorage.setItem("userName", name);
      localStorage.setItem("userEmail", email);

      // Redirect to main page
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
