<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About - StreamFlare</title>

    <!-- Tailwind -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.0.0/dist/tailwind.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #020617, #020617, #020617);
        }

        .glass {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
        }
    </style>
</head>

<body class="text-white">

<!-- 🔥 NAVBAR -->
<nav class="flex justify-between items-center px-10 py-5 bg-black/60 backdrop-blur-md">
    <h1 class="text-2xl font-bold text-red-500">StreamFlare</h1>

    <div class="space-x-6">
        <a href="index.html" class="hover:text-red-500">Home</a>
        <a href="about.html" class="text-red-500">About</a>
    </div>
</nav>

<!-- 🔥 ABOUT SECTION -->
<section class="min-h-screen flex items-center px-10">

    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-10 items-center">

        <!-- LEFT -->
        <div>
            <h1 class="text-5xl font-bold mb-6">
                About <span class="text-red-500">StreamFlare</span>
            </h1>

            <p class="text-gray-300 text-lg mb-4 leading-relaxed">
                StreamFlare is a modern entertainment hub where users can explore movies,
                music, and games all in one place.
            </p>

            <p class="text-gray-400 mb-6">
                Built with performance and UI in mind, it delivers an immersive OTT-style experience.
            </p>

            <!-- FEATURES -->
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="glass p-4 rounded-lg">🎬 Movies</div>
                <div class="glass p-4 rounded-lg">🎵 Music</div>
                <div class="glass p-4 rounded-lg">🎮 Games</div>
                <div class="glass p-4 rounded-lg">⚡ Fast UI</div>
            </div>

            <a href="index.html">
                <button class="bg-red-500 px-6 py-3 rounded-lg hover:bg-red-600 transition">
                    Back to Home
                </button>
            </a>
        </div>

        <!-- RIGHT -->
        <div class="flex justify-center">
            <img src="assets/movie3.webp"
                class="w-[350px] rounded-xl shadow-2xl hover:scale-105 transition duration-500">
        </div>

    </div>

</section>

</body>
</html>
